<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — UniLend Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy2: #111f3a;
  --navy3: #172947;
  --blue: #1a56db;
  --blue2: #2563eb;
  --teal: #0ea5e9;
  --border: rgba(255,255,255,0.07);
  --card: rgba(255,255,255,0.04);
  --text: #f1f5f9;
  --text3: #94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 50%,var(--navy3) 100%);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.login-container{
  position:relative;
  width:100%;
  max-width:420px;
  padding:20px;
}
.login-bg{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(circle at 30% 20%,rgba(26,86,219,0.15) 0%,transparent 50%),
              radial-gradient(circle at 70% 80%,rgba(14,165,233,0.1) 0%,transparent 50%);
  animation:bgPulse 8s ease-in-out infinite;
}
@keyframes bgPulse{
  0%,100%{opacity:0.5;}
  50%{opacity:1;}
}
.login-modal{
  background:linear-gradient(145deg,var(--navy2),var(--navy3));
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px;
  transform:scale(0.9) translateY(30px);
  opacity:0;
  animation:modalEnter 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  box-shadow:0 40px 80px rgba(0,0,0,0.5);
  position:relative;
  overflow:hidden;
}
@keyframes modalEnter{
  to{transform:scale(1) translateY(0);opacity:1;}
}
.login-modal::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle,rgba(26,86,219,0.1) 0%,transparent 50%);
  animation:loginGlow 8s ease-in-out infinite;
}
@keyframes loginGlow{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(20%,20%);}
}
.login-header{text-align:center;margin-bottom:32px;}
.login-logo{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:#fff;
  margin:0 auto 16px;box-shadow:0 8px 25px rgba(26,86,219,0.4);
  animation:logoFloat 3s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
.login-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text3);}
.login-form{display:flex;flex-direction:column;gap:18px;}
.login-input-group{position:relative;}
.login-input-group label{
  display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;
  text-transform:uppercase;color:var(--text3);margin-bottom:8px;
}
.login-input{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;color:var(--text);font-size:14px;
  font-family:'DM Sans',sans-serif;outline:none;transition:all 0.3s ease;
}
.login-input:focus{
  border-color:var(--blue2);background:rgba(37,99,235,0.08);
  box-shadow:0 0 0 4px rgba(37,99,235,0.1);
}
.login-input::placeholder{color:var(--text3);}
.login-btn{
  width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:#fff;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 6px 20px rgba(26,86,219,0.35);
  position:relative;overflow:hidden;
}
.login-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s ease;
}
.login-btn:hover::before{left:100%;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,86,219,0.5);}
.login-btn:active{transform:translateY(0);}
.login-footer{
  text-align:center;margin-top:24px;padding-top:20px;
  border-top:1px solid var(--border);
}
.login-footer a{color:var(--blue2);font-size:13px;text-decoration:none;transition:color 0.3s;}
.login-footer a:hover{color:var(--teal);}
.back-link{
  text-align:center;margin-top:20px;
}
.back-link a{
  color:var(--text3);font-size:13px;text-decoration:none;
  transition:color 0.3s;
}
.back-link a:hover{color:var(--text);}
</style>
</head>
<body>
<div class="login-bg"></div>
<div class="login-container">
  <div class="login-modal">
    <div class="login-header">
      <div class="login-logo">UC</div>
      <div class="login-title">Welcome Back</div>
      <div class="login-sub">Sign in to your account</div>
    </div>
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="login-input-group">
        <label>Email Address</label>
        <input type="email" class="login-input" placeholder="Enter your email" required>
      </div>
      <div class="login-input-group">
        <label>Password</label>
        <input type="password" class="login-input" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:24px;right:24px;z-index:999;background:linear-gradient(135deg,var(--navy2),var(--navy3));border:1px solid rgba(16,185,129,0.3);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text);box-shadow:0 20px 40px rgba(0,0,0,0.4);transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);">
  <span id="toast-msg"></span>
</div>

<script>
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  const m=document.getElementById('toast-msg');
  m.textContent=msg;
  t.style.transform='translateX(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.style.transform='translateX(120%)',3000);
}

function handleLogin(e){
  e.preventDefault();
  const btn=e.target.querySelector('.login-btn');
  btn.textContent='Signing in...';
  btn.style.opacity='0.7';
  setTimeout(()=>{
    showToast('✅ Successfully signed in!');
    btn.textContent='Sign In';
    btn.style.opacity='1';
    e.target.reset();
    setTimeout(()=>{
      window.location.href='index.html';
    },1000);
  },1500);
}
</script>
</body>
</html>
